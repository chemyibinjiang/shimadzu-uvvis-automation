name: test

on:
  push:
  pull_request:

jobs:
  unit-tests:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e .
      - run: python -m unittest discover -s tests -v

  windows-acceptance:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - shell: powershell
        run: |
          $root = Join-Path $PWD "runtime\ci-setup"
          .\scripts\setup-control-pc.ps1 `
            -CommandDir (Join-Path $root "control") `
            -ExportDir (Join-Path $root "export") `
            -DataDir (Join-Path $root "data") `
            -MethodFile (Join-Path $root "parameter\ci.vspm") `
            -AuditDir (Join-Path $root "audit") `
            -Force
          .\scripts\test-simulator.ps1
